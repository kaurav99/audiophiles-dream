# GENERATED BY: ci-agent | PURPOSE: Structured bug report with audio signal-path diagnostic fields

name: Bug Report
description: Report a defect. Audio bugs require the signal-path section.
labels: ["bug"]
body:

  - type: markdown
    attributes:
      value: |
        Fill in all sections that apply. Audio playback bugs **require** the Signal-path section.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the defect
      placeholder: "e.g. Exclusive output is silent after toggling off then on"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      description: "Settings → About, or APK filename (e.g. 0.3.0 · Saṅgama / versionCode 12)"
      placeholder: "0.3.0 · Saṅgama (12)"
    validations:
      required: true

  - type: dropdown
    id: android_version
    attributes:
      label: Android version
      options:
        - Android 16 / SDK 36
        - Android 15 / SDK 35
        - Android 14 / SDK 34
        - Android 13 / SDK 33
        - Android 12 / SDK 32
        - Android 11 / SDK 30
        - Other (specify in Additional context)
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: "e.g. Pixel 9a"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Signal-path (required for audio bugs)"

  - type: dropdown
    id: usb_dac
    attributes:
      label: USB DAC connected?
      options:
        - "Yes"
        - "No"
        - "N/A — not an audio bug"
    validations:
      required: true

  - type: input
    id: dac_model
    attributes:
      label: USB DAC model
      placeholder: "e.g. Fosi Audio DS2 (leave blank if no DAC)"

  - type: dropdown
    id: exclusive
    attributes:
      label: Exclusive output toggle
      options:
        - "On"
        - "Off"
        - "N/A"
    validations:
      required: true

  - type: dropdown
    id: bit_perfect
    attributes:
      label: Bit-perfect toggle
      options:
        - "On"
        - "Off"
        - "N/A"
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: Audio format
      options:
        - FLAC
        - DSD — DSF
        - DSD — DFF
        - WAV
        - AIFF / AIFC
        - ALAC (M4A)
        - MP3
        - AAC
        - Opus
        - Vorbis
        - Remote stream (SoundCloud / Dropbox / WebDAV / DLNA / UPnP)
        - Other

  - type: input
    id: sample_rate
    attributes:
      label: Track sample rate
      placeholder: "e.g. 192000 Hz, or unknown"

  - type: input
    id: bit_depth
    attributes:
      label: Track bit depth
      placeholder: "e.g. 24-bit, or unknown"

  - type: input
    id: engine_path
    attributes:
      label: Engine / output path shown in app
      description: "Signal-path sheet or NowPlaying chip: NATIVE / EXO, EXCLUSIVE / SHARED"
      placeholder: "e.g. NATIVE · EXCLUSIVE, or EXO · SHARED"

  - type: textarea
    id: logcat
    attributes:
      label: Relevant logcat output
      description: |
        Capture with: `adb logcat -s UsbUAC NativeEngine EngineRouter ExoEngine AudioAnalyzer`
        Paste the lines around the moment the bug occurs.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
