# GENERATED BY: ci-agent | PURPOSE: Integration checklist for wiring a new module or package into the app

name: New Module Integration
description: Track the wiring of a new package or feature module into the app
labels: ["integration"]
body:

  - type: input
    id: module_name
    attributes:
      label: Module / package name
      placeholder: "e.g. com.audiophile.player.lyrics"
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: One paragraph max — what problem does this module solve?
    validations:
      required: true

  - type: dropdown
    id: agent_role
    attributes:
      label: Primary agent role responsible
      options:
        - integration-agent
        - audio-engine-agent
        - ui-agent
        - arch-agent
        - docs-agent
        - ci-agent
    validations:
      required: true

  - type: checkboxes
    id: dependency_declaration
    attributes:
      label: Dependency declaration
      options:
        - label: All new libraries added to `gradle/libs.versions.toml` (version catalog)
        - label: No library is duplicated (checked against existing entries)
        - label: No version conflict introduced (verified via `./gradlew :app:dependencies`)
        - label: New Gradle plugin (if any) declared in `settings.gradle.kts` `pluginManagement`

  - type: checkboxes
    id: di_wiring
    attributes:
      label: Dependency injection
      options:
        - label: "`@Singleton` / `@HiltViewModel` annotations applied correctly"
        - label: "`@Provides` or `@Binds` method added to `AppModule.kt` (or a new `@Module`)"
        - label: Repository / engine injected via constructor — never constructed manually

  - type: checkboxes
    id: interface_contract
    attributes:
      label: Interface contract
      options:
        - label: Public API surface is minimal — only what callers need is exposed
        - label: No direct coupling to `native_engine.cpp` or `EngineRouter.kt` without `arch-agent` review
        - label: Remote / network source routes through `ExoEngine` (native engine requires a local fd)
        - label: New `DataStore` preference keys added to `SettingsRepository.kt` only

  - type: checkboxes
    id: manifest
    attributes:
      label: AndroidManifest.xml
      options:
        - label: New permissions justified and documented in this issue
        - label: "`<service>`, `<receiver>`, or `<activity>` entries added with correct `android:exported`"
        - label: No exported component without an explicit intent-filter or `android:exported` value

  - type: checkboxes
    id: security
    attributes:
      label: Security
      options:
        - label: No hardcoded credentials, tokens, or passwords
        - label: OAuth tokens stored in `DataStore` only — not `SharedPreferences`, files, or source
        - label: No `android:usesCleartextTraffic` without explicit justification

  - type: checkboxes
    id: test_coverage
    attributes:
      label: Test coverage gate
      options:
        - label: Unit test added under `src/test/` — or a follow-up issue opened to track it
        - label: Happy-path manually verified on a physical device

  - type: checkboxes
    id: docs
    attributes:
      label: Documentation
      options:
        - label: No bare `TODO` / `FIXME` — each links to an issue number
        - label: "`Changelog.kt` updated with a user-facing entry"
        - label: Repo memory file created or updated if this module introduces new patterns

  - type: textarea
    id: known_limitations
    attributes:
      label: Known limitations and follow-up tasks
      description: List anything intentionally deferred, with issue links where possible
